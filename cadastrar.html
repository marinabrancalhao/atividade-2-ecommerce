<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/estilizacao-padrao.css" />
    <link rel="stylesheet" href="./styles/cadastrar.css" />
    <title>Cadastro de Cliente</title>
  </head>

  <body>
    <header class="header">
      <!-- menu logo e ícones -->
      <nav class="header__nav">
        <section class="header__top">
          <a href="./index.html"
            ><img
              class="header__logo"
              src="./images/logotipo.png"
              alt="Logotipo da marca Clique & Colha"
              width="200"
            />
          </a>
          <div class="header__search">
            <img
              src="./images/icons8-search-24.png"
              alt=""
              aria-hidden="true"
            />
            <label for="search" class="sr-only">Pesquisar produtos</label>
            <input id="search" type="text" placeholder="Pesquisar" />
          </div>

          <ul class="header__icons-list">
            <li class="header__icons-item">
              <a href="./login.html">
                <img
                  src="./images/icons8-user-24.png"
                  title="Minha conta"
                  alt="Minha conta"
                />
              </a>
            </li>
            <li class="header__icons-item">
              <a href="./carrinho.html">
                <img
                  src="./images/icons8-basket-24.png"
                  title="Minha cesta"
                  alt="Cesta"
                />
              </a>
            </li>
          </ul>
        </section>

        <!-- menu categorias -->
        <section class="header__categories">
          <ul class="header__categories-list">
            <li class="header__categories-item">
              <a href="index.html" aria-current="page">Início</a>
            </li>
            <li class="header__categories-item">
              <a href="frutas.html">Frutas</a>
            </li>
            <li class="header__categories-item">
              <a href="vegetais.html">Vegetais</a>
            </li>
            <li class="header__categories-item">
              <a href="bebidas.html">Bebidas</a>
            </li>
            <li class="header__categories-item">
              <a href="sobre.html">Sobre</a>
            </li>
          </ul>
        </section>
      </nav>
    </header>

    <main>
      <section class="register">
        <h1 class="register__title">Cadastro de Cliente</h1>

        <form class="register__form" action="">
          <div class="register__group">
            <label class="register__label" for="email">Email</label>
            <input
              class="register__input"
              type="email"
              id="email"
              name="email"
            />
          </div>

          <div class="register__line">
            <div class="register__group">
              <label class="register__label" for="nome">Nome</label>
              <input
                class="register__input"
                type="text"
                id="nome"
                name="nome"
              />
            </div>

            <div class="register__group">
              <label class="register__label" for="sobrenome">Sobrenome</label>
              <input
                class="register__input"
                type="text"
                id="sobrenome"
                name="sobrenome"
              />
            </div>
          </div>

          <div class="register__line">
            <div class="register__group">
              <label class="register__label" for="cpf">CPF</label>
              <input class="register__input" id="cpf" type="text" name="cpf" />
            </div>

            <div class="register__group">
              <label class="register__label" for="telefone">Telefone</label>
              <input
                class="register__input"
                type="tel"
                id="telefone"
                name="telefone"
              />
            </div>
          </div>

          <div class="register__line">
            <div class="register__group">
              <label class="register__label" for="genero">Gênero</label>
              <select class="register__input" id="genero" name="genero">
                <option value="" disabled selected>Selecione</option>
                <option value="feminino">Feminino</option>
                <option value="masculino">Masculino</option>
                <option value="outro">Outro</option>
                <option value="nao-informar">Não informar</option>
              </select>
            </div>

            <div class="register__group">
              <label class="register__label" for="data-nascimento"
                >Data de nascimento</label
              >
              <input
                class="register__input"
                type="date"
                id="data-nascimento"
                name="data-nascimento"
              />
            </div>
          </div>

          <div class="register__group">
            <label class="register__label" for="cep">CEP</label>
            <input class="register__input" type="text" id="cep" name="cep" />
          </div>

          <div class="register__group">
            <label class="register__label" for="rua">Rua</label>
            <input class="register__input" type="text" id="rua" name="rua" />
          </div>

          <div class="register__line">
            <div class="register__group">
              <label class="register__label" for="numero">Número</label>
              <input
                class="register__input"
                type="text"
                id="numero"
                name="numero"
              />
            </div>

            <div class="register__group">
              <label class="register__label" for="bairro">Bairro</label>
              <input
                class="register__input"
                type="text"
                id="bairro"
                name="bairro"
              />
            </div>
          </div>

          <div class="register__line">
            <div class="register__group">
              <label class="register__label" for="cidade">Cidade</label>
              <input
                class="register__input"
                type="text"
                id="cidade"
                name="cidade"
              />
            </div>

            <div class="register__group">
              <label class="register__label" for="estado">Estado</label>
              <input
                class="register__input"
                type="text"
                id="estado"
                name="estado"
              />
            </div>
          </div>

          <button class="btn btn--submit" type="submit">Cadastrar</button>
        </form>
      </section>

      <section class="banner">
        Faça seu cadastro e aproveite todas as vantagens de ser cliente Clique &
        Colha
      </section>
    </main>

    <footer class="footer">
      <p><small>&copy; 2026 Clique & Colha</small></p>
      <p><small>Desenvolvido por Marina Brancalhão</small></p>
    </footer>
    <script src="./scripts/cadastrar.js"></script>
  </body>
</html>
